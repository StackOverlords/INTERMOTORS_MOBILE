name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Create .env
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> .env

      - name: Build release APKs
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          mv android/app/build/outputs/apk/release/app-arm64-v8a-release.apk \
             intermotors-${{ github.ref_name }}-arm64-v8a.apk
          mv android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk \
             intermotors-${{ github.ref_name }}-armeabi-v7a.apk

      - name: Generate version.json
        run: |
          cat > version.json << EOF
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/intermotors-${{ github.ref_name }}-arm64-v8a.apk",
            "releaseNotes": ""
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            intermotors-${{ github.ref_name }}-arm64-v8a.apk
            intermotors-${{ github.ref_name }}-armeabi-v7a.apk
            version.json
          generate_release_notes: true
